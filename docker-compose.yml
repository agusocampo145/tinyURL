services:
  app:
    build: .
    container_name: tinyurl_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: on-failure

  mongodb:
    image: mongo:7
    container_name: tinyurl_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: tinyurl_redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
