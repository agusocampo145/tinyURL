<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyURL</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 4px;
            display: none;
        }

        #error {
            margin-top: 20px;
            padding: 15px;
            background: #ffe0e0;
            border-radius: 4px;
            display: none;
            color: red;
        }

        a {
            color: #0070f3;
        }
    </style>
</head>

<body>
    <h1>TinyURL</h1>

    <label>URL original *</label>
    <input type="text" id="originalUrl" placeholder="https://www.ejemplo.com/pagina-muy-larga" />

    <label>Alias personalizado (opcional)</label>
    <input type="text" id="alias" placeholder="mi-alias" />

    <button onclick="createUrl()">Acortar URL</button>

    <div id="result">
        URL creada: <a id="shortLink" href="#" target="_blank"></a>
    </div>

    <div id="error" id="errorMsg"></div>

    <hr style="margin: 40px 0" />

    <h2>Estadísticas</h2>
    <input type="text" id="statsCode" placeholder="Código o alias (ej: AbC123)" />
    <button onclick="getStats()">Ver stats</button>

    <div id="statsResult" style="margin-top:20px; display:none;">
        <pre id="statsData"></pre>
    </div>

    <script>
        async function createUrl() {
            const originalUrl = document.getElementById('originalUrl').value.trim();
            const alias = document.getElementById('alias').value.trim();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            const body = { originalUrl };
            if (alias) body.alias = alias;

            try {
                const res = await fetch('/urls', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = (data.error ?? 'Error desconocido');
                    errorDiv.style.display = 'block';
                    return;
                }

                const link = document.getElementById('shortLink');
                link.href = data.shortUrl;
                link.textContent = data.shortUrl;
                resultDiv.style.display = 'block';

            } catch (e) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        }

        async function getStats() {
            const code = document.getElementById('statsCode').value.trim();
            const statsResult = document.getElementById('statsResult');
            const statsData = document.getElementById('statsData');

            statsResult.style.display = 'none';

            try {
                const res = await fetch(`/urls/${code}/stats`);
                const data = await res.json();
                statsData.textContent = JSON.stringify(data, null, 2);
                statsResult.style.display = 'block';
            } catch (e) {
                statsData.textContent = 'Error al obtener estadísticas';
                statsResult.style.display = 'block';
            }
        }
    </script>
</body>

</html>
